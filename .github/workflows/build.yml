name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Restore Admin
        run: dotnet restore RoyalBakeryAdmin/RoyalBakeryAdmin.csproj

      - name: Restore Restaurant
        run: dotnet restore RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Publish Admin EXE
        run: dotnet publish RoyalBakeryAdmin/RoyalBakeryAdmin.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/admin --self-contained -r win-x64

      - name: Publish Restaurant EXE
        run: dotnet publish RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/restaurant --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/admin/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.restaurant.sample publish/restaurant/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.25.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.25.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.25.zip
          Compress-Archive -Path publish/admin/* -DestinationPath RoyalBakeryAdmin-v1.25.zip
          Compress-Archive -Path publish/restaurant/* -DestinationPath RoyalBakeryRestaurant-v1.25.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.25
          name: v1.25 - QR Scanner Works From Any Input Field
          body: |
            ## Changes in v1.25 - QR Scanner Works From Any Input Field

            ### Cashier System
            - **QR SCAN FROM ANY FIELD**: QR scanner now works regardless of which input field has focus — if scanner types a sales order number (SO-XXXXX) into the item search box, it is automatically detected and redirected to the order search
            - **ENTER KEY DETECTION**: When scanner sends Enter key after typing into item search, SO- prefix is detected and order is loaded instantly
            - **DEBOUNCE DETECTION**: Even without Enter key, the 150ms search debounce detects SO- prefix and redirects to order search

            ## Downloads
            - **RoyalBakeryCashier-v1.25.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.25.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.25.zip** — API server
            - **RoyalBakeryAdmin-v1.25.zip** — Admin Panel EXE
            - **RoyalBakeryRestaurant-v1.25.zip** — Restaurant POS terminal EXE
          files: |
            RoyalBakeryCashier-v1.25.zip
            RoyalBakerySalesman-v1.25.zip
            RoyalBakeryAPI-v1.25.zip
            RoyalBakeryAdmin-v1.25.zip
            RoyalBakeryRestaurant-v1.25.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/

      - name: Upload Admin EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAdmin-Windows
          path: publish/admin/

      - name: Upload Restaurant EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryRestaurant-Windows
          path: publish/restaurant/
