name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Restore Admin
        run: dotnet restore RoyalBakeryAdmin/RoyalBakeryAdmin.csproj

      - name: Restore Restaurant
        run: dotnet restore RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Publish Admin EXE
        run: dotnet publish RoyalBakeryAdmin/RoyalBakeryAdmin.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/admin --self-contained -r win-x64

      - name: Publish Restaurant EXE
        run: dotnet publish RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/restaurant --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/admin/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.restaurant.sample publish/restaurant/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.20.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.20.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.20.zip
          Compress-Archive -Path publish/admin/* -DestinationPath RoyalBakeryAdmin-v1.20.zip
          Compress-Archive -Path publish/restaurant/* -DestinationPath RoyalBakeryRestaurant-v1.20.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.20
          name: v1.20 - Restaurant POS + Bug Fixes + Admin Login
          body: |
            ## Changes in v1.20

            ### New: Restaurant POS Terminal
            - Separate Restaurant POS with 64 restaurant items across 6 categories (Rice, Dinner, Curry, Beverages, Side Dishes, Lunch Pack)
            - Direct sale model — no inventory/stock tracking (restaurant items managed separately)
            - Order source tracking: Dine In, Pickme Food, Ubereats
            - KOT (Kitchen Order Ticket) printing for Pickme Food & Ubereats orders
            - Separate KOT printer config via terminal.config (KOTPrinter setting)
            - Invoice printing with "RESTAURANT" header
            - Login screen with user authentication
            - All 64 items auto-seeded on first run

            ### POS Terminal (Salesman) Fixes
            - **REMOVED**: "Order Created" popup — bill prints and screen clears silently
            - **ADDED**: Out of stock popup when item has zero stock
            - **ADDED**: Available quantity shown on each item card (next to price)
            - **FIXED**: Cart animation removed — items appear instantly (KeepScrollOffset)
            - **OPTIMIZED**: Faster item-to-cart flow

            ### Cashier Fixes
            - **ADDED**: Available quantity shown on each item card (next to price)
            - **FIXED**: Cart animation removed — items appear instantly (KeepScrollOffset)

            ### Admin Panel Fixes
            - **ADDED**: Login screen with admin-only role check
            - **FIXED**: Date filters now visible (white Frame with dark text, was invisible on light bg)
            - **FIXED**: Database initialization moved to login flow (EnsureCreated + ApplyMigrations)

            ### GRN Stock Clearance
            - API code verified correct — FIFO deduction from GRNItems.CurrentQuantity and Stocks.Quantity
            - If clearance not deducting, please update to latest API (v1.20)

            ## Downloads
            - **RoyalBakeryCashier-v1.20.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.20.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.20.zip** — API server
            - **RoyalBakeryAdmin-v1.20.zip** — Admin Panel EXE
            - **RoyalBakeryRestaurant-v1.20.zip** — Restaurant POS terminal EXE (NEW)
          files: |
            RoyalBakeryCashier-v1.20.zip
            RoyalBakerySalesman-v1.20.zip
            RoyalBakeryAPI-v1.20.zip
            RoyalBakeryAdmin-v1.20.zip
            RoyalBakeryRestaurant-v1.20.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/

      - name: Upload Admin EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAdmin-Windows
          path: publish/admin/

      - name: Upload Restaurant EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryRestaurant-Windows
          path: publish/restaurant/
