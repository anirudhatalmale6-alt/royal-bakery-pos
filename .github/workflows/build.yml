name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Restore Admin
        run: dotnet restore RoyalBakeryAdmin/RoyalBakeryAdmin.csproj

      - name: Restore Restaurant
        run: dotnet restore RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Publish Admin EXE
        run: dotnet publish RoyalBakeryAdmin/RoyalBakeryAdmin.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/admin --self-contained -r win-x64

      - name: Publish Restaurant EXE
        run: dotnet publish RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/restaurant --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/admin/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.restaurant.sample publish/restaurant/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.24.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.24.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.24.zip
          Compress-Archive -Path publish/admin/* -DestinationPath RoyalBakeryAdmin-v1.24.zip
          Compress-Archive -Path publish/restaurant/* -DestinationPath RoyalBakeryRestaurant-v1.24.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.24
          name: v1.24 - Instant Payment Popup & Cancel Fix
          body: |
            ## Changes in v1.24 - Instant Payment Popup & Cancel Fix

            ### Cashier System
            - **INSTANT CANCEL**: Cancel button now closes payment popup instantly — no item reload, cart stays exactly as it was
            - **INSTANT PAY BUTTON**: Payment popup opens instantly — DB connection deferred to Confirm only (no DB work on open)
            - **ZERO-ANIMATION MODALS**: All popup open/close transitions disabled for instant response
            - **BACKGROUND DB ON CONFIRM**: Sale creation, stock deduction, and GRN deduction all run on background thread — UI stays responsive
            - **ASYNC DAILY REPORT**: Daily sales report query runs on background thread
            - **ASYNC QR SCAN LOAD**: Sales order lookup runs on background thread

            ### Restaurant System
            - **INSTANT CANCEL**: Same fix — cancel keeps cart, no unnecessary clearing
            - **INSTANT PAY BUTTON**: Same — no animation, background DB on confirm
            - **BACKGROUND DB ON CONFIRM**: Restaurant sale creation runs on background thread

            ### Salesman System
            - **ASYNC ORDER CREATION**: Sales order number generation runs on background thread
            - **ZERO-ANIMATION MODALS**: History popup opens instantly

            ### Performance Target
            - All user actions now respond in under 1 second on Celeron + 4GB RAM hardware

            ## Downloads
            - **RoyalBakeryCashier-v1.24.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.24.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.24.zip** — API server
            - **RoyalBakeryAdmin-v1.24.zip** — Admin Panel EXE
            - **RoyalBakeryRestaurant-v1.24.zip** — Restaurant POS terminal EXE
          files: |
            RoyalBakeryCashier-v1.24.zip
            RoyalBakerySalesman-v1.24.zip
            RoyalBakeryAPI-v1.24.zip
            RoyalBakeryAdmin-v1.24.zip
            RoyalBakeryRestaurant-v1.24.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/

      - name: Upload Admin EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAdmin-Windows
          path: publish/admin/

      - name: Upload Restaurant EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryRestaurant-Windows
          path: publish/restaurant/
