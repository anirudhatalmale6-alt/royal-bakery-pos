name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.13.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.13.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.13.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.13
          name: v1.13 - Seed Data Fix
          body: |
            ## Changes in v1.13
            - **CRITICAL FIX**: Fixed seed data not loading — SQL batch was rejected due to referencing non-existent GRN columns (DateTime, TotalItems, TotalQuantity)
            - Fixed foreign key constraint errors when seeding on existing databases
            - Properly clears all dependent tables (Sales, Orders, Clearances, etc.) before re-seeding menu items
            - All 200 bakery items across 18 categories now load correctly
            - All previous fixes included (search bar, load button, QR duplicate check)

            ## Downloads
            - **RoyalBakeryCashier-v1.13.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.13.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.13.zip** — API server
          files: |
            RoyalBakeryCashier-v1.13.zip
            RoyalBakerySalesman-v1.13.zip
            RoyalBakeryAPI-v1.13.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/
