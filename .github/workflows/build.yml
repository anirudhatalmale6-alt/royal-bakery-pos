name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.7.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.7.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.7.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.7
          name: v1.7 - Performance Optimization + Sales Order Completion
          body: |
            ## Changes in v1.7
            - **POS Speed Optimization**: Items/categories now load instantly — all data cached in memory, no DB queries on filter/cart operations
            - **Sales Order Completion**: After cashier processes payment for a sales order, it's marked as Paid (QR won't work again)
            - **Cashier Network Config**: Cashier now includes terminal.config.sample for connecting to remote SQL Server
            - Removed slow null-reassign UI refresh pattern
            - All previous fixes included

            ## Downloads
            - **RoyalBakeryCashier-v1.7.zip** — Cashier terminal EXE (includes terminal.config.sample)
            - **RoyalBakerySalesman-v1.7.zip** — Salesman terminal EXE (includes terminal.config.sample)
            - **RoyalBakeryAPI-v1.7.zip** — API server
          files: |
            RoyalBakeryCashier-v1.7.zip
            RoyalBakerySalesman-v1.7.zip
            RoyalBakeryAPI-v1.7.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/
