name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.11.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.11.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.11.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.11
          name: v1.11 - Item Search + New Restaurant Menu
          body: |
            ## Changes in v1.11
            - **Item Search Bar** — Search items by name across all categories for instant access
            - **New Menu Data** — 64 restaurant items in 6 categories (Rice, Dinner, Curry, Beverages, Side Dishes, Lunch Pack)
            - **Old bakery items cleared** — Database reseeded with restaurant items only
            - **Quicks 1 & 2 empty** — Client can assign items to quick categories later
            - All previous fixes included

            ## Downloads
            - **RoyalBakeryCashier-v1.11.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.11.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.11.zip** — API server
          files: |
            RoyalBakeryCashier-v1.11.zip
            RoyalBakerySalesman-v1.11.zip
            RoyalBakeryAPI-v1.11.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/
