name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.4.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.4.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.4.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4
          name: v1.4 - API Seeds Menu Data + GRN
          body: |
            ## Changes in v1.4
            - API: Now seeds 20 categories + 195 menu items from Excel price lists on first startup
            - API: Creates initial GRN for all items with quantity 10
            - API: Stocks initialized with qty 10 for all items
            - Cashier/Salesman: Stock qty updated to 10 (matching API)
            - All v1.3 fixes included (missing tables, daily report, stock validation, fast startup)

            ## Downloads
            - **RoyalBakeryCashier-v1.4.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.4.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.4.zip** — API server
          files: |
            RoyalBakeryCashier-v1.4.zip
            RoyalBakerySalesman-v1.4.zip
            RoyalBakeryAPI-v1.4.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/
