name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.8.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.8.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.8.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.8
          name: v1.8 - Direct GRN Edit + API Update
          body: |
            ## Changes in v1.8
            - **API: Direct GRN Edit** — PUT /api/grn/{id} for direct editing without approval flow
            - **API: Edit History** — GET /api/grn/{id}/edits shows same-day edit log with reasons
            - **GRNEditLogs table** auto-created on startup
            - All v1.7 changes included (POS speed optimization, sales order completion, network config)

            ## Downloads
            - **RoyalBakeryCashier-v1.8.zip** — Cashier terminal EXE (includes terminal.config.sample)
            - **RoyalBakerySalesman-v1.8.zip** — Salesman terminal EXE (includes terminal.config.sample)
            - **RoyalBakeryAPI-v1.8.zip** — API server (updated with direct GRN edit endpoints)
          files: |
            RoyalBakeryCashier-v1.8.zip
            RoyalBakerySalesman-v1.8.zip
            RoyalBakeryAPI-v1.8.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/
