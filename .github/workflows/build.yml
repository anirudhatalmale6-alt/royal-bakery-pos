name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Restore Admin
        run: dotnet restore RoyalBakeryAdmin/RoyalBakeryAdmin.csproj

      - name: Restore Restaurant
        run: dotnet restore RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Publish Admin EXE
        run: dotnet publish RoyalBakeryAdmin/RoyalBakeryAdmin.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/admin --self-contained -r win-x64

      - name: Publish Restaurant EXE
        run: dotnet publish RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/restaurant --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/admin/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.restaurant.sample publish/restaurant/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.21.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.21.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.21.zip
          Compress-Archive -Path publish/admin/* -DestinationPath RoyalBakeryAdmin-v1.21.zip
          Compress-Archive -Path publish/restaurant/* -DestinationPath RoyalBakeryRestaurant-v1.21.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.21
          name: v1.21 - Restaurant Payment + GRN Fix + Admin Search
          body: |
            ## Changes in v1.21

            ### Restaurant POS
            - **ADDED**: Cash/Card payment popup (same as Cashier) — replaces direct sale
            - Payment page with numpad, cash/card tabs, balance/change display
            - Invoice receipt now includes Cash/Card/Change breakdown

            ### GRN Stock Clearance Fix
            - **FIXED**: Explicit Update() calls on Stock and GRNItems entities during clearance
            - Ensures CurrentQuantity deduction is properly persisted by EF Core

            ### Admin Panel Enhancements
            - **ADDED**: Search on every page (Categories, Sales Report, GRN Report, Clearance Report)
            - **IMPROVED**: Quick Category selection now uses dropdown (None/Quick 1/Quick 2) instead of number input
            - **NEW**: Restaurant Products management page (add, edit, delete restaurant items)
            - **NEW**: Restaurant Categories management page (add, edit, delete restaurant categories)

            ## Downloads
            - **RoyalBakeryCashier-v1.21.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.21.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.21.zip** — API server
            - **RoyalBakeryAdmin-v1.21.zip** — Admin Panel EXE
            - **RoyalBakeryRestaurant-v1.21.zip** — Restaurant POS terminal EXE (NEW)
          files: |
            RoyalBakeryCashier-v1.21.zip
            RoyalBakerySalesman-v1.21.zip
            RoyalBakeryAPI-v1.21.zip
            RoyalBakeryAdmin-v1.21.zip
            RoyalBakeryRestaurant-v1.21.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/

      - name: Upload Admin EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAdmin-Windows
          path: publish/admin/

      - name: Upload Restaurant EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryRestaurant-Windows
          path: publish/restaurant/
