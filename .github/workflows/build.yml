name: Build All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Cashier
        run: dotnet restore RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj

      - name: Restore Salesman
        run: dotnet restore RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj

      - name: Restore API
        run: dotnet restore RoyalBakeryAPI/RoyalBakeryAPI.csproj

      - name: Restore Admin
        run: dotnet restore RoyalBakeryAdmin/RoyalBakeryAdmin.csproj

      - name: Restore Restaurant
        run: dotnet restore RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj

      - name: Publish Cashier EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakeryCashierTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/cashier --self-contained -r win-x64

      - name: Publish Salesman EXE
        run: dotnet publish RoyalBakeryCashier/RoyalBakerySalesmanTerminal.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/salesman --self-contained -r win-x64

      - name: Publish API
        run: dotnet publish RoyalBakeryAPI/RoyalBakeryAPI.csproj -c Release -o publish/api --self-contained -r win-x64

      - name: Publish Admin EXE
        run: dotnet publish RoyalBakeryAdmin/RoyalBakeryAdmin.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/admin --self-contained -r win-x64

      - name: Publish Restaurant EXE
        run: dotnet publish RoyalBakeryRestaurant/RoyalBakeryRestaurant.csproj -c Release -f net9.0-windows10.0.19041.0 -o publish/restaurant --self-contained -r win-x64

      - name: Copy sample configs
        run: |
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/cashier/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.salesman.sample publish/salesman/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.cashier.sample publish/admin/terminal.config.sample
          Copy-Item RoyalBakeryCashier/terminal.config.restaurant.sample publish/restaurant/terminal.config.sample

      - name: Zip artifacts
        run: |
          Compress-Archive -Path publish/cashier/* -DestinationPath RoyalBakeryCashier-v1.26.zip
          Compress-Archive -Path publish/salesman/* -DestinationPath RoyalBakerySalesman-v1.26.zip
          Compress-Archive -Path publish/api/* -DestinationPath RoyalBakeryAPI-v1.26.zip
          Compress-Archive -Path publish/admin/* -DestinationPath RoyalBakeryAdmin-v1.26.zip
          Compress-Archive -Path publish/restaurant/* -DestinationPath RoyalBakeryRestaurant-v1.26.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.26
          name: v1.26 - PickMe Delivery Platform Integration
          body: |
            ## Changes in v1.26 - PickMe Delivery Platform Integration

            ### API (RoyalBakeryAPI)
            - **PICKME POLLING SERVICE**: Background service polls PickMe API every 30 seconds for new orders
            - **AUTO-SAVE ORDERS**: When "Merchant Confirmed" order detected, automatically creates RestaurantSale/Sale records
            - **BAKERY STOCK DEDUCTION**: Bakery items from PickMe orders automatically deduct stock
            - **DELIVERY ORDER TRACKING**: New DeliveryOrders + DeliveryOrderItems tables track all platform orders
            - **KOT ENDPOINT**: GET /api/delivery/pending-kot for Restaurant POS to fetch orders needing KOT print
            - **DELIVERY API**: GET /api/delivery/orders with platform/date filters for Admin Panel
            - **REF_ID MAPPING**: Items mapped via ref_id format B-{id} (bakery) and R-{id} (restaurant)
            - **MULTI-ACCOUNT SUPPORT**: Supports 2 PickMe accounts (bakery+restaurant and restaurant-only)

            ### Restaurant POS
            - **AUTO KOT PRINTING**: Polls API every 5 seconds, auto-prints KOT for new delivery orders
            - **DELIVERY KOT FORMAT**: Shows platform name, order ID, delivery mode, phone, items with options/notes
            - **API URL CONFIG**: New terminal.config setting ApiUrl for API connection

            ### Admin Panel
            - **DELIVERY ORDERS PAGE**: New page showing all delivery platform orders
            - **PLATFORM FILTERS**: Filter by PickMe/UberEats and date
            - **ORDER DETAIL VIEW**: Click any order to see full details (items, customer, status, KOT status)
            - **SUMMARY CARDS**: Total orders, revenue, PickMe count, Uber count

            ### Configuration
            - appsettings.json: PickMe API keys, sandbox/live URLs, poll interval
            - terminal.config: ApiUrl setting for Restaurant POS

            ## Downloads
            - **RoyalBakeryCashier-v1.26.zip** — Cashier terminal EXE
            - **RoyalBakerySalesman-v1.26.zip** — Salesman terminal EXE
            - **RoyalBakeryAPI-v1.26.zip** — API server
            - **RoyalBakeryAdmin-v1.26.zip** — Admin Panel EXE
            - **RoyalBakeryRestaurant-v1.26.zip** — Restaurant POS terminal EXE
          files: |
            RoyalBakeryCashier-v1.26.zip
            RoyalBakerySalesman-v1.26.zip
            RoyalBakeryAPI-v1.26.zip
            RoyalBakeryAdmin-v1.26.zip
            RoyalBakeryRestaurant-v1.26.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cashier EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryCashier-Windows
          path: publish/cashier/

      - name: Upload Salesman EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakerySalesman-Windows
          path: publish/salesman/

      - name: Upload API
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAPI-Windows
          path: publish/api/

      - name: Upload Admin EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryAdmin-Windows
          path: publish/admin/

      - name: Upload Restaurant EXE
        uses: actions/upload-artifact@v4
        with:
          name: RoyalBakeryRestaurant-Windows
          path: publish/restaurant/
